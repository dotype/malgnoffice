<div class="container-fluid p-4">
    <h2 class="mb-4">조직도</h2>

    <!-- 조직도 트리 -->
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <!-- CEO -->
            <div class="text-center mb-4">
                <div class="d-inline-block">
                    <div class="card border shadow-sm" style="min-width: 160px;">
                        <div class="card-body py-2 px-3 text-center">
                            <div class="rounded-circle d-flex align-items-center justify-content-center text-white fw-bold mx-auto mb-1" style="width: 40px; height: 40px; background: #0052CC;">대</div>
                            <div class="fw-bold">김대표</div>
                            <div class="text-secondary small">대표이사</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 부서 -->
            <div class="row g-4 justify-content-center">
                <div v-for="dept in departments" :key="dept.name" class="col-12 col-md-6 col-lg-3">
                    <div class="card border h-100">
                        <div class="card-header text-center py-2" :style="{ background: dept.color + '15', borderBottom: '2px solid ' + dept.color }">
                            <div class="fw-bold" :style="{ color: dept.color }">{{ dept.name }}</div>
                        </div>
                        <div class="card-body p-0">
                            <div v-for="member in dept.members" :key="member.name" class="d-flex align-items-center gap-2 p-2 border-bottom">
                                <div class="rounded-circle d-flex align-items-center justify-content-center text-white" :style="{ background: dept.color, width: '30px', height: '30px', fontSize: '12px' }">{{ member.initial }}</div>
                                <div>
                                    <div class="small fw-medium">{{ member.name }}</div>
                                    <div class="text-secondary" style="font-size: 11px;">{{ member.position }}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
