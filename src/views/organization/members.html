<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">직원 목록</h2>
        <div class="d-flex gap-2">
            <div class="input-group" style="width: 240px;">
                <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control" placeholder="이름으로 검색" v-model="searchQuery">
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>이름</th>
                            <th>부서</th>
                            <th>직급</th>
                            <th>이메일</th>
                            <th>전화번호</th>
                            <th>입사일</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-for="member in filteredMembers" :key="member.id">
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="rounded-circle d-flex align-items-center justify-content-center text-white fw-bold" :style="{ background: member.color, width: '32px', height: '32px', fontSize: '13px' }">{{ member.initial }}</div>
                                    <span class="fw-medium">{{ member.name }}</span>
                                </div>
                            </td>
                            <td>{{ member.department }}</td>
                            <td>{{ member.position }}</td>
                            <td class="text-secondary">{{ member.email }}</td>
                            <td class="text-secondary">{{ member.phone }}</td>
                            <td class="text-secondary">{{ member.joinDate }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
