<div class="container-fluid p-4">
    <h2 class="mb-4">출퇴근</h2>

    <div class="row g-4">
        <!-- 출퇴근 체크 -->
        <div class="col-12 col-md-5">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body py-5">
                    <div class="display-4 fw-bold mb-2">{{ currentTime }}</div>
                    <p class="text-secondary mb-4">{{ currentDate }}</p>

                    <div v-if="checkIn" class="mb-3">
                        <span class="badge bg-success-subtle text-success px-3 py-2">
                            <i class="bi bi-check-circle me-1"></i> 출근: {{ checkIn }}
                        </span>
                    </div>
                    <div v-if="checkOut" class="mb-3">
                        <span class="badge bg-primary-subtle text-primary px-3 py-2">
                            <i class="bi bi-check-circle me-1"></i> 퇴근: {{ checkOut }}
                        </span>
                    </div>

                    <div class="d-flex gap-2 justify-content-center mt-4">
                        <button class="btn btn-primary btn-lg px-5" @click="handleCheckIn" :disabled="!!checkIn">
                            <i class="bi bi-box-arrow-in-right me-1"></i> 출근
                        </button>
                        <button class="btn btn-outline-primary btn-lg px-5" @click="handleCheckOut" :disabled="!checkIn || !!checkOut">
                            <i class="bi bi-box-arrow-right me-1"></i> 퇴근
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 이번 주 기록 -->
        <div class="col-12 col-md-7">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white border-bottom">
                    <h6 class="mb-0 fw-bold">이번 주 근태 기록</h6>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>날짜</th>
                                <th>출근</th>
                                <th>퇴근</th>
                                <th>근무시간</th>
                                <th>상태</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="record in weekRecords" :key="record.date">
                                <td class="fw-medium">{{ record.date }}</td>
                                <td>{{ record.checkIn || '-' }}</td>
                                <td>{{ record.checkOut || '-' }}</td>
                                <td>{{ record.workHours || '-' }}</td>
                                <td><span class="badge" :class="getStatusClass(record.status)">{{ record.status }}</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
