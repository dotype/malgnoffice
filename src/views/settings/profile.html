<div class="container-fluid p-4">
    <h2 class="mb-4">내 정보</h2>

    <div class="row g-4">
        <!-- 프로필 카드 -->
        <div class="col-12 col-md-4">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body py-4">
                    <div class="rounded-circle d-flex align-items-center justify-content-center text-white fw-bold mx-auto mb-3" style="width: 80px; height: 80px; background: #0052CC; font-size: 2rem;">관</div>
                    <h5 class="mb-1">{{ profile.name }}</h5>
                    <p class="text-secondary mb-2">{{ profile.position }} | {{ profile.department }}</p>
                    <span class="badge bg-primary-subtle text-primary">{{ profile.role }}</span>
                </div>
            </div>
        </div>

        <!-- 정보 수정 -->
        <div class="col-12 col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-bottom">
                    <h6 class="mb-0 fw-bold">기본 정보</h6>
                </div>
                <div class="card-body">
                    <form @submit.prevent="handleSave">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-medium">이름</label>
                                <input v-model="profile.name" type="text" class="form-control" readonly>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">사번</label>
                                <input v-model="profile.employeeId" type="text" class="form-control" readonly>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">이메일</label>
                                <input v-model="profile.email" type="email" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">전화번호</label>
                                <input v-model="profile.phone" type="tel" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">부서</label>
                                <input v-model="profile.department" type="text" class="form-control" readonly>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">직급</label>
                                <input v-model="profile.position" type="text" class="form-control" readonly>
                            </div>
                        </div>
                        <hr>
                        <button type="submit" class="btn btn-primary">저장</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
