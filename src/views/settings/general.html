<div class="container-fluid p-4">
    <h2 class="mb-4">기본 설정</h2>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white border-bottom">
            <h6 class="mb-0 fw-bold">알림 설정</h6>
        </div>
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                <div>
                    <div class="fw-medium">결재 알림</div>
                    <div class="text-secondary small">결재 요청/승인/반려 시 알림</div>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" v-model="settings.approvalNotification">
                </div>
            </div>
            <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                <div>
                    <div class="fw-medium">일정 알림</div>
                    <div class="text-secondary small">일정 시작 전 알림</div>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" v-model="settings.scheduleNotification">
                </div>
            </div>
            <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                <div>
                    <div class="fw-medium">게시판 알림</div>
                    <div class="text-secondary small">새 공지사항, 댓글 알림</div>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" v-model="settings.boardNotification">
                </div>
            </div>
            <div class="d-flex justify-content-between align-items-center py-2">
                <div>
                    <div class="fw-medium">이메일 알림</div>
                    <div class="text-secondary small">중요 알림을 이메일로 수신</div>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" v-model="settings.emailNotification">
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white border-bottom">
            <h6 class="mb-0 fw-bold">근무 설정</h6>
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-medium">출근 시간</label>
                    <input v-model="settings.workStart" type="time" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-medium">퇴근 시간</label>
                    <input v-model="settings.workEnd" type="time" class="form-control">
                </div>
            </div>
        </div>
    </div>

    <button class="btn btn-primary" @click="handleSave">설정 저장</button>
</div>
