<div class="container-fluid p-4">
    <h2 class="mb-4">결재 대기</h2>

    <div v-if="pendingItems.length === 0" class="card border-0 shadow-sm">
        <div class="card-body text-center text-secondary py-5">
            <i class="bi bi-check-circle fs-1 d-block mb-2"></i>
            대기 중인 결재가 없습니다.
        </div>
    </div>

    <div v-for="item in pendingItems" :key="item.id" class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                    <span class="badge me-2" :class="getTypeClass(item.type)">{{ item.type }}</span>
                    <span class="fw-bold">{{ item.title }}</span>
                </div>
                <span class="text-secondary small">{{ item.date }}</span>
            </div>
            <p class="text-secondary mb-3">{{ item.content }}</p>
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-2">
                    <div class="rounded-circle d-flex align-items-center justify-content-center text-white fw-bold" :style="{ background: item.avatarColor, width: '28px', height: '28px', fontSize: '12px' }">{{ item.initial }}</div>
                    <span class="small">{{ item.requester }}</span>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-danger" @click="handleReject(item.id)">반려</button>
                    <button class="btn btn-sm btn-primary" @click="handleApprove(item.id)">승인</button>
                </div>
            </div>
        </div>
    </div>
</div>
