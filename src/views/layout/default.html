<div class="app-layout">
    <!-- Sidebar Overlay (모바일) -->
    <div class="sidebar-overlay" :class="{ 'show': isMobile && sidebarVisible }" @click="closeSidebar"></div>

    <!-- Sidebar -->
    <aside class="app-sidebar" :class="{ 'show': sidebarVisible }">
        <!-- 로고 -->
        <div class="sidebar-header">
            <a href="#/home" class="sidebar-logo">
                <div class="sidebar-logo-icon">
                    <i class="bi bi-building"></i>
                </div>
                <span>{{ appName }}</span>
            </a>
        </div>

        <!-- 네비게이션 -->
        <nav class="sidebar-nav">
            <!-- 대시보드 -->
            <div class="mx-0 my-0">
                <a href="#/home" class="nav-link" :class="{ active: isActive('/home') }" @click="closeSidebar">
                    <i class="bi bi-grid"></i>
                    <span class="nav-label">대시보드</span>
                </a>
            </div>

            <div class="nav-section-label">업무</div>

            <!-- 일정관리 -->
            <div class="mx-0 my-0">
                <div class="accordion-header" :class="{ active: isAccordionOpen('schedule') }" @click="toggleAccordion('schedule')">
                    <i class="bi bi-calendar-event icon"></i>
                    <span>일정관리</span>
                    <i class="bi bi-chevron-down chevron"></i>
                </div>
                <div class="accordion-content" :class="{ open: isAccordionOpen('schedule') }">
                    <a href="#/schedule/calendar" class="nav-link" :class="{ active: isActive('/schedule/calendar') }" @click="closeSidebar">
                        <span class="nav-label">캘린더</span>
                    </a>
                    <a href="#/schedule/my" class="nav-link" :class="{ active: isActive('/schedule/my') }" @click="closeSidebar">
                        <span class="nav-label">내 일정</span>
                    </a>
                    <a href="#/schedule/team" class="nav-link" :class="{ active: isActive('/schedule/team') }" @click="closeSidebar">
                        <span class="nav-label">팀 일정</span>
                    </a>
                </div>
            </div>

            <!-- 근태관리 -->
            <div class="mx-0 my-0">
                <div class="accordion-header" :class="{ active: isAccordionOpen('attendance') }" @click="toggleAccordion('attendance')">
                    <i class="bi bi-clock-history icon"></i>
                    <span>근태관리</span>
                    <i class="bi bi-chevron-down chevron"></i>
                </div>
                <div class="accordion-content" :class="{ open: isAccordionOpen('attendance') }">
                    <a href="#/attendance/check" class="nav-link" :class="{ active: isActive('/attendance/check') }" @click="closeSidebar">
                        <span class="nav-label">출퇴근</span>
                    </a>
                    <a href="#/attendance/my" class="nav-link" :class="{ active: isActive('/attendance/my') }" @click="closeSidebar">
                        <span class="nav-label">내 근태현황</span>
                    </a>
                    <a href="#/attendance/vacation" class="nav-link" :class="{ active: isActive('/attendance/vacation') }" @click="closeSidebar">
                        <span class="nav-label">휴가 관리</span>
                    </a>
                </div>
            </div>

            <!-- 일일업무 -->
            <div class="mx-0 my-0">
                <div class="accordion-header" :class="{ active: isAccordionOpen('work') }" @click="toggleAccordion('work')">
                    <i class="bi bi-journal-text icon"></i>
                    <span>일일업무</span>
                    <i class="bi bi-chevron-down chevron"></i>
                </div>
                <div class="accordion-content" :class="{ open: isAccordionOpen('work') }">
                    <a href="#/work/daily" class="nav-link" :class="{ active: isActive('/work/daily') }" @click="closeSidebar">
                        <span class="nav-label">업무 보고</span>
                    </a>
                    <a href="#/work/team" class="nav-link" :class="{ active: isActive('/work/team') }" @click="closeSidebar">
                        <span class="nav-label">팀 업무현황</span>
                    </a>
                </div>
            </div>

            <!-- 결재관리 -->
            <div class="mx-0 my-0">
                <div class="accordion-header" :class="{ active: isAccordionOpen('approval') }" @click="toggleAccordion('approval')">
                    <i class="bi bi-file-earmark-check icon"></i>
                    <span>결재관리</span>
                    <i class="bi bi-chevron-down chevron"></i>
                </div>
                <div class="accordion-content" :class="{ open: isAccordionOpen('approval') }">
                    <a href="#/approval/request" class="nav-link" :class="{ active: isActive('/approval/request') }" @click="closeSidebar">
                        <span class="nav-label">결재 요청</span>
                    </a>
                    <a href="#/approval/pending" class="nav-link" :class="{ active: isActive('/approval/pending') }" @click="closeSidebar">
                        <span class="nav-label">결재 대기</span>
                    </a>
                    <a href="#/approval/history" class="nav-link" :class="{ active: isActive('/approval/history') }" @click="closeSidebar">
                        <span class="nav-label">결재 이력</span>
                    </a>
                </div>
            </div>

            <div class="nav-section-label">커뮤니티</div>

            <!-- 게시판 -->
            <div class="mx-0 my-0">
                <div class="accordion-header" :class="{ active: isAccordionOpen('board') }" @click="toggleAccordion('board')">
                    <i class="bi bi-clipboard2 icon"></i>
                    <span>게시판</span>
                    <i class="bi bi-chevron-down chevron"></i>
                </div>
                <div class="accordion-content" :class="{ open: isAccordionOpen('board') }">
                    <a href="#/board/notice" class="nav-link" :class="{ active: isActive('/board/notice') }" @click="closeSidebar">
                        <span class="nav-label">공지사항</span>
                    </a>
                    <a href="#/board/free" class="nav-link" :class="{ active: isActive('/board/free') }" @click="closeSidebar">
                        <span class="nav-label">자유게시판</span>
                    </a>
                </div>
            </div>

            <div class="nav-section-label">관리</div>

            <!-- 조직관리 -->
            <div class="mx-0 my-0">
                <div class="accordion-header" :class="{ active: isAccordionOpen('organization') }" @click="toggleAccordion('organization')">
                    <i class="bi bi-diagram-3 icon"></i>
                    <span>조직관리</span>
                    <i class="bi bi-chevron-down chevron"></i>
                </div>
                <div class="accordion-content" :class="{ open: isAccordionOpen('organization') }">
                    <a href="#/organization/chart" class="nav-link" :class="{ active: isActive('/organization/chart') }" @click="closeSidebar">
                        <span class="nav-label">조직도</span>
                    </a>
                    <a href="#/organization/members" class="nav-link" :class="{ active: isActive('/organization/members') }" @click="closeSidebar">
                        <span class="nav-label">직원 목록</span>
                    </a>
                </div>
            </div>

            <!-- 설정 -->
            <div class="mx-0 my-0">
                <div class="accordion-header" :class="{ active: isAccordionOpen('settings') }" @click="toggleAccordion('settings')">
                    <i class="bi bi-gear icon"></i>
                    <span>설정</span>
                    <i class="bi bi-chevron-down chevron"></i>
                </div>
                <div class="accordion-content" :class="{ open: isAccordionOpen('settings') }">
                    <a href="#/settings/profile" class="nav-link" :class="{ active: isActive('/settings/profile') }" @click="closeSidebar">
                        <span class="nav-label">내 정보</span>
                    </a>
                    <a href="#/settings/general" class="nav-link" :class="{ active: isActive('/settings/general') }" @click="closeSidebar">
                        <span class="nav-label">기본 설정</span>
                    </a>
                </div>
            </div>
        </nav>
    </aside>

    <!-- 오른쪽 영역 -->
    <div class="app-right">
        <!-- Header -->
        <header class="app-header">
            <!-- 왼쪽: 햄버거 + 페이지 경로 -->
            <div class="header-side d-flex align-items-center gap-2">
                <button class="header-hamburger" @click="toggleSidebar">
                    <i class="bi bi-list"></i>
                </button>
            </div>

            <!-- 오른쪽: 알림 + 사용자 -->
            <div class="header-side d-flex align-items-center gap-1 justify-content-end">
                <!-- 알림 -->
                <button class="header-action" @click="toggleNotifications">
                    <i class="bi bi-bell"></i>
                    <span class="badge" v-if="notificationCount > 0">{{ notificationCount }}</span>
                </button>

                <!-- 사용자 메뉴 -->
                <div class="user-menu" @click="toggleUserMenu">
                    <div class="user-avatar">{{ userInitial }}</div>
                    <div class="user-info">
                        <div class="user-name">{{ userName }}</div>
                        <div class="user-role">{{ userRole }}</div>
                    </div>
                    <i class="bi bi-chevron-down" style="color: var(--gray-400); font-size: 0.7rem;"></i>

                    <!-- 드롭다운 -->
                    <div class="user-dropdown" v-show="showUserMenu">
                        <div class="d-flex align-items-center gap-3 p-3">
                            <div class="user-avatar">{{ userInitial }}</div>
                            <div>
                                <div class="user-name">{{ userName }}</div>
                                <div class="user-role">{{ userRole }}</div>
                            </div>
                        </div>
                        <hr class="m-0">
                        <a href="#/settings/profile" class="user-dropdown-item" @click.stop="goToProfile">
                            <i class="bi bi-person"></i>
                            <span>내 정보</span>
                        </a>
                        <hr class="m-0">
                        <button class="user-dropdown-item text-danger" @click.stop="handleLogout">
                            <i class="bi bi-box-arrow-right"></i>
                            <span>로그아웃</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-body">
            <div class="app-main">
                {{ content }}
            </div>
        </main>
    </div>
</div>
