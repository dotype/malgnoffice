<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">내 일정</h2>
        <button class="btn btn-primary" @click="showAddForm = !showAddForm">
            <i class="bi bi-plus-lg me-1"></i> 일정 추가
        </button>
    </div>

    <!-- 필터 -->
    <div class="d-flex gap-2 mb-3">
        <button v-for="filter in filters" :key="filter.value" class="btn btn-sm" :class="currentFilter === filter.value ? 'btn-primary' : 'btn-outline-secondary'" @click="currentFilter = filter.value">
            {{ filter.label }}
        </button>
    </div>

    <!-- 일정 목록 -->
    <div v-if="filteredSchedules.length === 0" class="card border-0 shadow-sm">
        <div class="card-body text-center text-secondary py-5">일정이 없습니다.</div>
    </div>
    <div v-for="item in filteredSchedules" :key="item.id" class="card border-0 shadow-sm mb-2">
        <div class="card-body d-flex align-items-center gap-3">
            <div class="rounded-2 px-2 py-1 text-center" :style="{ background: item.color + '20', color: item.color, minWidth: '80px' }">
                <div class="small fw-bold">{{ item.date }}</div>
                <div style="font-size: 11px;">{{ item.time }}</div>
            </div>
            <div class="flex-grow-1">
                <div class="fw-medium">{{ item.title }}</div>
                <div class="text-secondary small">{{ item.location }}</div>
            </div>
            <span class="badge" :class="getCategoryClass(item.category)">{{ item.category }}</span>
        </div>
    </div>
</div>
