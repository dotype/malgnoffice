<div class="cal-page">
    <!-- 상단 필터 영역 -->
    <div class="cal-filter-bar">
        <span class="cal-filter-label">구분</span>
        <label v-for="cat in categories" :key="cat.key" class="cal-checkbox-label">
            <input type="checkbox" v-model="cat.visible" class="cal-checkbox" :style="{ accentColor: cat.color }">
            {{ cat.label }}
        </label>
    </div>

    <!-- 네비게이션 & 등록 버튼 -->
    <div class="cal-nav-bar">
        <div class="cal-nav-left">
            <span class="cal-today-label">오늘 : {{ todayLabel }}</span>
            <button class="cal-nav-arrow" @click="prevMonth"><i class="bi bi-chevron-left"></i></button>
            <button class="cal-nav-arrow" @click="nextMonth"><i class="bi bi-chevron-right"></i></button>
            <span class="cal-month-title">{{ currentYear }}년 {{ String(currentMonth).padStart(2, '0') }}월</span>
        </div>
        <div class="cal-nav-right">
            <button class="cal-reg-btn cal-reg-schedule" @click="openAddForm('schedule')">일정 등록 <i class="bi bi-chevron-right"></i></button>
            <button class="cal-reg-btn cal-reg-education" @click="openAddForm('education')">직무교육 등록 <i class="bi bi-chevron-right"></i></button>
            <button class="cal-reg-btn cal-reg-vacation" @click="openAddForm('vacation')">휴가 등록 <i class="bi bi-chevron-right"></i></button>
            <button class="cal-reg-btn cal-reg-holiday" @click="openAddForm('holiday')">휴일 등록 <i class="bi bi-chevron-right"></i></button>
        </div>
    </div>

    <div class="cal-body">
        <div class="cal-grid-wrapper">
            <!-- 요일 헤더 -->
            <div class="cal-col-header">
                <div class="cal-wk-label">주</div>
                <div class="cal-weekday cal-weekday-sun">일</div>
                <div class="cal-weekday">월</div>
                <div class="cal-weekday">화</div>
                <div class="cal-weekday">수</div>
                <div class="cal-weekday">목</div>
                <div class="cal-weekday">금</div>
                <div class="cal-weekday cal-weekday-sat">토</div>
            </div>

            <!-- 주별 행 -->
            <div v-for="(week, wIdx) in calendarWeeks" :key="wIdx" class="cal-row">
                <!-- 주차 번호 -->
                <div class="cal-wk-num">{{ week.weekNum }}</div>

                <!-- 7일 그리드 (플랫 그리드 - dense 패킹) -->
                <div class="cal-row-grid">
                    <!-- 날짜 번호 (row 1 고정) -->
                    <div v-for="(day, dIdx) in week.days" :key="'n'+dIdx" class="cal-day-hdr" :class="{ 'cal-day-other': !day.currentMonth, 'cal-day-today-cell': day.isToday }" :style="{ gridColumn: dIdx + 1, gridRow: 1 }">
                        <span class="cal-day-n" :class="{ 'cal-today-n': day.isToday, 'cal-sun': dIdx === 0, 'cal-sat': dIdx === 6 }">{{ day.day }}</span>
                    </div>

                    <!-- 여러 날 걸치는 이벤트 (스팬 바) - dense 패킹으로 자동 배치 -->
                    <template v-for="(lane, lIdx) in week.spans" :key="'ln'+lIdx">
                        <div v-for="span in lane" :key="span.id" class="cal-span-bar" :class="'cal-span-' + span.style" :style="{ gridColumn: span.col + ' / span ' + span.width }" :title="span.title">
                            <span v-if="span.showTitle">{{ span.title }}</span>
                        </div>
                    </template>

                    <!-- 단일 일정 - 각 이벤트가 독립 그리드 아이템 -->
                    <template v-for="(day, dIdx) in week.days" :key="'d'+dIdx">
                        <div v-for="ev in day.singleEvents" :key="ev.id" class="cal-ev" :class="'cal-ev-' + ev.type" :style="{ gridColumn: dIdx + 1 }">
                            <span class="cal-ev-dot" :class="'cal-ev-dot-' + ev.type"></span>
                            <span class="cal-ev-label">{{ ev.title }}</span>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- 우측 패널 -->
        <div class="cal-sidebar d-none d-xxl-flex">
            <div class="cal-sidebar-title">이달의 주요일정</div>
            <div v-for="item in majorEvents" :key="item.id" class="cal-sidebar-card">
                <div class="cal-sidebar-card-title">{{ item.title }}</div>
                <div class="cal-sidebar-card-date">{{ item.datetime }}</div>
            </div>
        </div>
    </div>
</div>
