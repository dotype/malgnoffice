<div class="container-fluid p-4">
    <h2 class="mb-4">팀 일정</h2>

    <!-- 팀원 필터 -->
    <div class="d-flex gap-2 mb-3 flex-wrap">
        <button class="btn btn-sm" :class="selectedMember === 'all' ? 'btn-primary' : 'btn-outline-secondary'" @click="selectedMember = 'all'">전체</button>
        <button v-for="member in members" :key="member.name" class="btn btn-sm" :class="selectedMember === member.name ? 'btn-primary' : 'btn-outline-secondary'" @click="selectedMember = member.name">
            {{ member.name }}
        </button>
    </div>

    <!-- 팀 일정 타임라인 -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 100px;">날짜</th>
                            <th style="width: 70px;">시간</th>
                            <th>일정</th>
                            <th style="width: 100px;">담당자</th>
                            <th style="width: 120px;">장소</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-for="item in filteredSchedules" :key="item.id">
                            <td class="fw-medium">{{ item.date }}</td>
                            <td>{{ item.time }}</td>
                            <td>{{ item.title }}</td>
                            <td>
                                <div class="d-flex align-items-center gap-1">
                                    <div class="rounded-circle d-flex align-items-center justify-content-center text-white" :style="{ background: item.avatarColor, width: '24px', height: '24px', fontSize: '11px' }">{{ item.initial }}</div>
                                    <span class="small">{{ item.member }}</span>
                                </div>
                            </td>
                            <td class="text-secondary small">{{ item.location }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
