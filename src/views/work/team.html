<div class="container-fluid p-4">
    <h2 class="mb-4">팀 업무현황</h2>

    <!-- 팀원별 업무 현황 -->
    <div class="row g-3">
        <div v-for="member in teamMembers" :key="member.name" class="col-12 col-md-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white border-bottom">
                    <div class="d-flex align-items-center gap-2">
                        <div class="rounded-circle d-flex align-items-center justify-content-center text-white fw-bold" :style="{ background: member.color, width: '32px', height: '32px', fontSize: '13px' }">{{ member.initial }}</div>
                        <div>
                            <div class="fw-medium">{{ member.name }}</div>
                            <div class="text-secondary small">{{ member.position }}</div>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div v-for="task in member.tasks" :key="task.title" class="mb-3">
                        <div class="d-flex justify-content-between mb-1">
                            <span class="small">{{ task.title }}</span>
                            <span class="small fw-medium">{{ task.progress }}%</span>
                        </div>
                        <div class="progress" style="height: 6px;">
                            <div class="progress-bar" :class="task.progress >= 100 ? 'bg-success' : 'bg-primary'" :style="{ width: task.progress + '%' }"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
