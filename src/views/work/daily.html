<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">업무 보고</h2>
        <button class="btn btn-primary" @click="showForm = !showForm">
            <i class="bi bi-plus-lg me-1"></i> 업무 작성
        </button>
    </div>

    <!-- 업무 작성 폼 -->
    <div v-if="showForm" class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white border-bottom">
            <h6 class="mb-0 fw-bold">오늘의 업무 보고</h6>
        </div>
        <div class="card-body">
            <form @submit.prevent="handleSubmit">
                <div class="mb-3">
                    <label class="form-label fw-medium">오늘 한 일</label>
                    <textarea v-model="form.done" class="form-control" rows="3" placeholder="완료한 업무를 작성하세요"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">진행 중</label>
                    <textarea v-model="form.doing" class="form-control" rows="3" placeholder="진행 중인 업무를 작성하세요"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">내일 할 일</label>
                    <textarea v-model="form.todo" class="form-control" rows="3" placeholder="내일 예정된 업무를 작성하세요"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">이슈 / 건의사항</label>
                    <textarea v-model="form.issues" class="form-control" rows="2" placeholder="(선택) 이슈나 건의사항"></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">제출</button>
                    <button type="button" class="btn btn-outline-secondary" @click="showForm = false">취소</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 업무 보고 목록 -->
    <div v-for="report in reports" :key="report.id" class="card border-0 shadow-sm mb-3">
        <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
                <div class="rounded-circle d-flex align-items-center justify-content-center text-white fw-bold" style="width: 28px; height: 28px; font-size: 12px; background: #0052CC;">{{ report.initial }}</div>
                <span class="fw-medium">{{ report.author }}</span>
            </div>
            <span class="text-secondary small">{{ report.date }}</span>
        </div>
        <div class="card-body">
            <div class="mb-2">
                <span class="badge bg-success-subtle text-success me-2">완료</span>
                <span>{{ report.done }}</span>
            </div>
            <div class="mb-2">
                <span class="badge bg-primary-subtle text-primary me-2">진행</span>
                <span>{{ report.doing }}</span>
            </div>
            <div>
                <span class="badge bg-secondary-subtle text-secondary me-2">예정</span>
                <span>{{ report.todo }}</span>
            </div>
        </div>
    </div>
</div>
